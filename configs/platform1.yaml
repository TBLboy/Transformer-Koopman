# ============================================================
# 实验基本设置
# ============================================================
experiment:
  name: "platform1_patchtst"
  seed: 42
  device: "cuda"
  precision: "float32"  # float32 (单精度) / float64 (双精度)
  deterministic: false
  cudnn_benchmark: true
  amp: true
  allow_tf32: true
  log_dir: "./results/logs/platform1"
  save_dir: "./results/models/platform1"

# ============================================================
# 数据相关参数
# ============================================================
data:
  # 数据路径（指向文件夹）
  data_dir: "./data/experiment_001"

  # 文件名
  train_file: "train.npz"
  val_file: "val.npz"
  test_file: "test.npz"

  # 数据维度
  state_dim: 6          # n: 状态维度 (3个关节位置 + 3个关节速度)
  control_dim: 3        # m: 控制输入维度 (3个关节力矩)

  # 预处理
  normalize_state: true
  normalize_control: true
  normalization_method: "standard"  # standard / minmax

  # 噪声注入（用于噪声鲁棒性实验）
  add_noise: false
  noise_level: 0.0
  noise_type: "gaussian"

# ============================================================
# PatchTST编码器参数
# ============================================================
encoder:
  # 历史窗口
  history_length: 16    # P: 历史时刻数
  patch_length: 4       # p: 每个patch的长度

  # 模型维度
  latent_dim: 64        # d: 潜在空间维度（减小）
  d_model: 128          # Transformer模型维度

  # Transformer结构
  n_layers: 3           # L: Transformer层数（增加）
  n_heads: 4            # 多头注意力的头数
  d_ff: 128             # 前馈网络维度（RTX 5060 Ti GPU 16GB 放大到 512）
  dropout: 0.1

  # 位置编码
  positional_encoding: "sinusoidal"  # sinusoidal / learnable

  # Readout方式
  readout_method: "mean"  # mean / max / last

# ============================================================
# Koopman动力学参数
# ============================================================
koopman:
  # 稳定性约束
  enforce_stability: false  # 关闭SVD限制，让EDMD自由计算最优A、B
  rho_max: 0.95         # 最大奇异值上界（当enforce_stability=true时生效）

  # 模型类型
  model_type: "linear"  # linear / bilinear

# ============================================================
# 线性降维参数
# ============================================================
decoder:
  decoder_type: "linear"  # linear / mlp

# ============================================================
# 训练参数
# ============================================================
training:
  # 训练方法选择
  method: "edmd"        # edmd / end_to_end

  # ============ EDMD方法参数 ============
  edmd:
    # 预训练阶段（训练编码器和降维矩阵）
    pretrain:
      enabled: true           # 是否预训练编码器
      num_epochs: 300         # 预训练轮数（再增加）
      batch_size: 1024        # RTX 5060 Ti 16GB
      learning_rate: 0.0003   # 再降低学习率
      optimizer: "adam"
      early_stopping: true
      patience: 50            # 增加patience
      min_delta: 0.00001

      # 三项损失权重
      loss_weights:
        prediction: 1.0        # H步自回归预测损失（H=1 → 等价原单步）
        latent: 0.5            # λ₂: 升维空间预测损失
        consistency: 0.5       # λ₃: 一致性约束损失

    # 多步预测视野（H=1 → 单步，与原版一致）
    rollout:
      horizon: 10               # 预测步数
      gamma: 0.95              # 步间衰减因子（越远权重越低）

    # EDMD计算参数
    compute:
      regularization: 0.000001    # Tikhonov正则化
      svd_clipping: false     # 关闭SVD限制
      batch_encode: true      # 是否批量编码（节省内存）
      batch_size: 1024         # 编码时的batch size

    # 降维矩阵学习
    decoder:
      method: "least_squares" # least_squares / gradient
      regularization: 0.000001

  # ============ 传统EDMD方法参数（对照组，无神经网络） ============
  traditional_edmd:
    # 升维函数配置
    lifting_function:
      type: "robot"  # polynomial / rbf / robot / threelink
      params: {}

    # EDMD计算参数
    compute:
      regularization: 10    # Tikhonov正则化（ IMPORTANT: 必须设置为10才能稳定）
      svd_clipping: false         # 是否应用SVD限制
      batch_size: 1024            # 编码时的batch size

  # ============ 端到端方法参数 ============
  end_to_end:
    # 训练参数
    batch_size: 1024
    num_epochs: 200
    learning_rate: 0.001
    optimizer: "adam"         # adam / sgd / adamw

    # 学习率调度
    scheduler: "step"         # step / cosine / none
    scheduler_params:
      step_size: 100
      gamma: 0.9

    # 早停
    early_stopping: true
    patience: 50
    min_delta: 0.00001

    # 梯度裁剪
    grad_clip: 1.0

    # SVD约束
    svd_projection:
      enabled: true           # 是否在每步后应用SVD投影
      frequency: 1            # 每N步投影一次（1表示每步都投影）

    # 损失函数权重
    loss_weights:
      prediction: 1.0         # 预测误差权重
      stability: 1.0          # 稳定性约束权重
      regularization: 0.001   # 正则化权重

  # ============ 通用参数 ============
  # 验证和保存
  val_every_n_epochs: 5
  save_every_n_epochs: 10
  save_best_only: true

  # 设备和并行
  num_workers: 4              # DataLoader worker 数量
  prefetch_factor: 4          # 每个 worker 预取 batch 数

# ============================================================
# 控制器参数
# ============================================================
controller:
  # 控制器类型
  type: "lqr"           # lqr / mpc / none

  # LQR参数
  lqr:
    Q_matrix: "identity"  # identity / custom
    R_matrix: "identity"
    Q_scale: 1.0
    R_scale: 0.1

# ============================================================
# 评估参数
# ============================================================
evaluation:
  prediction:
    one_step: true
    multi_step: true
    multi_step_horizons: [5, 10, 20]

  tracking:
    enabled: false
    reference_trajectories: ["sine", "circle", "step"]
    tracking_length: 100

  visualization:
    plot_predictions: true
    plot_trajectories: true
    plot_koopman_spectrum: true
    save_format: "png"

# ============================================================
# 日志和调试
# ============================================================
logging:
  level: "INFO"
  log_to_file: true
  log_to_console: true
  tensorboard: false
  wandb: false
  log_frequency: 10

# ============================================================
# MLP-Koopman 参数（对照基线）
# ============================================================
mlp_koopman:
  # ── 编码器结构 ──────────────────────────────────────────────
  latent_dim: 64            # d: 升维后的潜在空间维度（与 PatchTST 保持一致）
  hidden_dims: [256, 128, 64]   # MLP 隐藏层维度列表
  activation: "relu"        # relu / tanh / elu
  dropout: 0.1

  # ── 训练方式 ────────────────────────────────────────────────
  training_method: "end_to_end"   # edmd / end_to_end（与训练好的模型一致）

  # ── EDMD 训练参数 ────────────────────────────────────────────
  edmd:
    pretrain:
      enabled: true
      num_epochs: 300
      batch_size: 128
      learning_rate: 0.0003
      optimizer: "adam"
      early_stopping: true
      patience: 50
      min_delta: 0.00001
      loss_weights:
        prediction: 1.0
        latent: 0.5
        consistency: 0.5

    compute:
      regularization: 1
      batch_size: 1024

  # ── 端到端训练参数 ───────────────────────────────────────────
  end_to_end:
    num_epochs: 300
    batch_size: 128
    learning_rate: 0.0003
    optimizer: "adam"
    early_stopping: true
    patience: 50
    min_delta: 0.00001
    grad_clip: 1.0
